<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- tailwind+daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!-- google-fonts -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
      <!-- icons -->
       <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

      <style>
        *{
              font-family: "Inter", sans-serif;

        }
      </style>
</head>
<body class="bg-slate-100 font-dm min-h-screen">

    <!-- header -->
    <header class="px-5 py-6 md:max-w-6xl mx-auto">
        <h1 class="font-syne text-2xl md:text-3xl font-extrabold text-navy tracking-tight">Job Application Tracker</h1>

         <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bg-white border rounded p-4">
        <p class="text-sm text-gray-500">Total</p>
        <p id="totalCountNo" class="text-2xl font-semibold">0</p>
      </div>
      <div class="bg-white border rounded p-4">
        <p class="text-sm text-gray-500">Interview</p>
        <p id="interviewCountNo" class="text-2xl font-semibold text-green-600">0</p>
      </div>
      <div class="bg-white border rounded p-4">
        <p class="text-sm text-gray-500">Rejected</p>
        <p id="rejectCountNo" class="text-2xl font-semibold text-red-500">0</p>
      </div>
    </div>
    </header>
     

    <!-- Available Jobs -->
    <main class="px-5 py-6 md:max-w-6xl mx-auto">

        <div class="flex justify-between items-center mb-2">
        <h2 class="font-medium">Available Jobs</h2>
        <span id="tabNo" class="text-sm text-gray-500">0 jobs</span>
    </div>

          <!-- tab -->
    <div class="flex gap-2 mb-4">
      <button onclick="setTab('all')" class="bg-blue-600 text-white px-3 py-1 text-sm rounded">All</button>
      <button onclick="setTab('interview')" class="bg-gray-200  px-3 py-1 text-sm rounded">Interview</button>
      <button onclick="setTab('rejected')" class="bg-gray-200 px-3 py-1 text-sm rounded">Rejected</button>
    </div>


      
    <!-- No jobs available -->
    <div id="jobContainer"></div>
    <div id="emptyState" class="hidden text-center py-16">
      <img src="./jobs.png" class="w-16 mx-auto mb-4">
      <h3 class="font-semibold">No jobs available</h3>
      <p class="text-gray-500 text-sm">Check back soon for new job opportunities</p>
    </div>
  </div>

    </main>




    <script src="./script.js"></script>
    
</body>
</html>
