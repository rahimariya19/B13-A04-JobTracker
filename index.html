<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- tailwind+daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!-- google-fonts -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
      <!-- icons -->
       <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

      <style>
        *{
              font-family: "Inter", sans-serif;

        }
      </style>
</head>
<body class="bg-slate-100 font-dm min-h-screen">
    <header class="px-5 py-6 md:max-w-6xl mx-auto">
        <h1 class="font-syne text-2xl md:text-3xl font-extrabold text-navy tracking-tight">Job Application Tracker</h1>

         <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bg-white border rounded p-4">
        <p class="text-sm text-gray-500">Total</p>
        <p id="totalCount" class="text-2xl font-semibold">0</p>
      </div>
      <div class="bg-white border rounded p-4">
        <p class="text-sm text-gray-500">Interview</p>
        <p id="interviewCount" class="text-2xl font-semibold text-green-600">0</p>
      </div>
      <div class="bg-white border rounded p-4">
        <p class="text-sm text-gray-500">Rejected</p>
        <p id="rejectedCount" class="text-2xl font-semibold text-red-500">0</p>
      </div>
    </div>
    </header>
    
</body>
</html>
